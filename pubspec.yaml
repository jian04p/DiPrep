name: diprep_flutter
description: DiPrep Emergency Alert System - Flutter Edition
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.1.0
  flutter_svg: ^2.0.0
  google_maps_flutter: ^2.5.0
  dio: ^5.3.0
  flutter_polyline_points: ^3.1.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  
  # SOS Feature Dependencies
  flutter_background_service: ^5.0.5
  permission_handler: ^12.0.1
  cloud_firestore: ^6.1.2

  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_ai: ^3.8.0
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
