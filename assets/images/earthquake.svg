<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c4033;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="150" fill="#87ceeb"/>
  <!-- Ground -->
  <rect y="150" width="400" height="150" fill="url(#groundGradient)"/>
  <!-- Cracks in ground -->
  <path d="M 200 150 Q 180 180 200 210" stroke="#2c1810" stroke-width="3" fill="none"/>
  <path d="M 200 150 Q 220 180 200 210" stroke="#2c1810" stroke-width="3" fill="none"/>
  <path d="M 100 200 L 150 240" stroke="#2c1810" stroke-width="2" fill="none"/>
  <path d="M 300 200 L 250 240" stroke="#2c1810" stroke-width="2" fill="none"/>
  <!-- Building with damage -->
  <rect x="80" y="100" width="100" height="120" fill="#d4541f"/>
  <polygon points="80,100 130,60 180,100" fill="#8b3412"/>
  <!-- Cracks on building -->
  <line x1="100" y1="110" x2="140" y2="150" stroke="#2c1810" stroke-width="2"/>
  <line x1="140" y1="120" x2="160" y2="160" stroke="#2c1810" stroke-width="2"/>
  <line x1="110" y1="180" x2="150" y2="210" stroke="#2c1810" stroke-width="2"/>
  <!-- Windows -->
  <rect x="95" y="125" width="15" height="15" fill="#4a5568"/>
  <rect x="145" y="125" width="15" height="15" fill="#4a5568"/>
  <rect x="95" y="165" width="15" height="15" fill="#4a5568"/>
  <rect x="145" y="165" width="15" height="15" fill="#4a5568"/>
  <!-- Safe spot marker -->
  <circle cx="280" cy="180" r="30" fill="#22c55e" opacity="0.7"/>
  <text x="280" y="190" text-anchor="middle" font-size="24" fill="#fff">✓</text>
  <text x="200" y="290" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">EARTHQUAKE SAFETY</text>
</svg>