<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyGradient)"/>
  <!-- Dark clouds -->
  <circle cx="80" cy="60" r="45" fill="#1a202c" opacity="0.9"/>
  <circle cx="140" cy="50" r="55" fill="#1a202c" opacity="0.9"/>
  <circle cx="200" cy="45" r="60" fill="#1a202c" opacity="0.9"/>
  <circle cx="280" cy="55" r="50" fill="#1a202c" opacity="0.9"/>
  <circle cx="340" cy="65" r="40" fill="#1a202c" opacity="0.9"/>
  <!-- Wind lines -->
  <line x1="20" y1="120" x2="100" y2="120" stroke="#cbd5e0" stroke-width="3" opacity="0.7"/>
  <line x1="50" y1="160" x2="150" y2="160" stroke="#cbd5e0" stroke-width="3" opacity="0.7"/>
  <line x1="200" y1="140" x2="350" y2="140" stroke="#cbd5e0" stroke-width="3" opacity="0.7"/>
  <line x1="150" y1="200" x2="280" y2="200" stroke="#cbd5e0" stroke-width="3" opacity="0.7"/>
  <!-- Rain -->
  <line x1="100" y1="150" x2="95" y2="180" stroke="#a0aec0" stroke-width="2"/>
  <line x1="150" y1="140" x2="145" y2="170" stroke="#a0aec0" stroke-width="2"/>
  <line x1="200" y1="145" x2="195" y2="175" stroke="#a0aec0" stroke-width="2"/>
  <line x1="250" y1="150" x2="245" y2="180" stroke="#a0aec0" stroke-width="2"/>
  <line x1="300" y1="155" x2="295" y2="185" stroke="#a0aec0" stroke-width="2"/>
  <!-- House with roof -->
  <rect x="150" y="220" width="100" height="70" fill="#d4541f"/>
  <polygon points="150,220 200,170 250,220" fill="#8b3412"/>
  <rect x="170" y="240" width="20" height="20" fill="#4a5568"/>
  <rect x="210" y="240" width="20" height="20" fill="#4a5568"/>
  <text x="200" y="290" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">TYPHOON SAFETY</text>
</svg>