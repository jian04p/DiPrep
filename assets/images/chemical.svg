<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="hazardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f3f4f6"/>
  <!-- Hazard warning symbol -->
  <polygon points="200,40 260,120 200,200 140,120" fill="url(#hazardGradient)"/>
  <text x="200" y="135" text-anchor="middle" font-size="60" fill="#fff" font-weight="bold">⚠</text>
  <!-- Chemical container -->
  <rect x="60" y="220" width="60" height="60" fill="#059669" rx="5"/>
  <rect x="70" y="215" width="40" height="15" fill="#047857" rx="3"/>
  <text x="90" y="260" text-anchor="middle" font-size="20" fill="#fff">☣</text>
  <!-- Spill pattern -->
  <ellipse cx="150" cy="260" rx="40" ry="25" fill="#059669" opacity="0.6"/>
  <!-- Safe distance zone -->
  <circle cx="300" cy="200" r="50" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="300" y="180" text-anchor="middle" font-size="12" fill="#22c55e" font-weight="bold">SAFE</text>
  <text x="300" y="200" text-anchor="middle" font-size="12" fill="#22c55e" font-weight="bold">DISTANCE</text>
  <!-- Protection equipment -->
  <g transform="translate(280, 130)">
    <circle cx="0" cy="0" r="8" fill="#4b5563"/>
    <rect x="-4" y="10" width="8" height="15" fill="#4b5563"/>
  </g>
  <text x="320" y="75" font-size="12" fill="#000">Protective gear</text>
  <text x="200" y="290" text-anchor="middle" font-size="16" fill="#000" font-weight="bold">CHEMICAL SPILL</text>
</svg>