<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="fireGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#15803d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#1f2937"/>
  <!-- Flames -->
  <path d="M 150 250 Q 140 200 150 150 Q 155 120 160 100 Q 145 140 150 180 Q 140 200 150 250" fill="url(#fireGradient)"/>
  <path d="M 200 260 Q 190 200 200 140 Q 210 100 220 80 Q 200 130 205 190 Q 195 220 200 260" fill="url(#fireGradient)"/>
  <path d="M 250 250 Q 240 190 250 130 Q 260 90 270 70 Q 250 120 255 180 Q 245 210 250 250" fill="url(#fireGradient)"/>
  <!-- Fire particles -->
  <circle cx="160" cy="90" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="210" cy="70" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="260" cy="85" r="5" fill="#fbbf24" opacity="0.8"/>
  <!-- Building -->
  <rect x="50" y="160" width="80" height="100" fill="#666"/>
  <rect x="140" y="100" width="80" height="160" fill="#666"/>
  <!-- Emergency exit sign -->
  <rect x="160" y="120" width="40" height="25" fill="#22c55e"/>
  <text x="180" y="137" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">EXIT</text>
  <!-- Safe zone -->
  <circle cx="320" cy="220" r="40" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="320" y="225" text-anchor="middle" font-size="12" fill="#22c55e" font-weight="bold">SAFE ZONE</text>
  <text x="200" y="290" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">FIRE SAFETY</text>
</svg>